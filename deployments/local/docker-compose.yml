  pyroscope:
    image: grafana/pyroscope:latest
    ports:
    - 4040:4040
    networks:
      - app_network

  redis-node-1:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--requirepass", "dragon_knight", "--masterauth", "dragon_knight"]
    networks:
      - app_network

  redis-node-2:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--requirepass", "dragon_knight", "--masterauth", "dragon_knight"]
    networks:
      - app_network

  redis-node-3:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--requirepass", "dragon_knight", "--masterauth", "dragon_knight"]
    networks:
      - app_network

  redis-node-4:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--requirepass", "dragon_knight", "--masterauth", "dragon_knight"]
    networks:
      - app_network

  redis-node-5:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--requirepass", "dragon_knight", "--masterauth", "dragon_knight"]
    networks:
      - app_network

  redis-node-6:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--requirepass", "dragon_knight", "--masterauth", "dragon_knight"]
    networks:
      - app_network

  redis-cluster-init:
    image: redis:7.4-alpine
    container_name: redis-cluster-init
    depends_on:
      redis-node-1:
        condition: service_started
      redis-node-2:
        condition: service_started
      redis-node-3:
        condition: service_started
      redis-node-4:
        condition: service_started
      redis-node-5:
        condition: service_started
      redis-node-6:
        condition: service_started
    command:
      - sh
      - -c
      - |
        for node in redis-node-1 redis-node-2 redis-node-3 redis-node-4 redis-node-5 redis-node-6; do
          until redis-cli -h $$node -a dragon_knight ping > /dev/null 2>&1; do
            echo "Waiting for $$node to be ready..."
            sleep 1
          done
        done

        if redis-cli --no-auth-warning -a dragon_knight --cluster check redis-node-1:6379 > /dev/null 2>&1; then
          echo "Redis cluster already initialized and healthy"
          exit 0
        fi

        echo "Creating Redis cluster..."
        echo "yes" | redis-cli --no-auth-warning -a dragon_knight --cluster create \
        redis-node-1:6379 \
        redis-node-2:6379 \
        redis-node-3:6379 \
        redis-node-4:6379 \
        redis-node-5:6379 \
        redis-node-6:6379 \
        --cluster-replicas 1
    networks:
      - app_network

  node-exporter:
    image: quay.io/prometheus/node-exporter
    container_name: node-exporter
    pid: "host"
    networks:
      - app_network
    volumes:
      - "/:/host:ro,rslave"
    command:
      - '--path.rootfs=/host'

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - app_network
    environment:
      - CLICKHOUSE_USER=dragon
      - CLICKHOUSE_PASSWORD=dragon_knight
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5


  kafka-1:
    image: apache/kafka:latest
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_CLUSTER_ID: kraft-cluster-01
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-2:
