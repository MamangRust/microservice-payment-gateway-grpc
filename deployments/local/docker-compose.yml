services:
      
  auth-db: &postgres-base
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=DRAGON
      - POSTGRES_PASSWORD=DRAGON
      - POSTGRES_DB=auth_db
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U DRAGON -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-bouncer: &bouncer-base
    image: edoburu/pgbouncer:latest
    restart: always
    environment:
      - DATABASE_URL=postgres://DRAGON:DRAGON@auth-db:5432/auth_db
      - DB_USER=DRAGON
      - DB_PASSWORD=DRAGON
      - DB_HOST=auth-db
      - DB_NAME=auth_db
      - AUTH_TYPE=plain
      - POOL_MODE=transaction
      - PGB_LISTEN_PORT=6432
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - ADMIN_USERS=DRAGON
    ports:
      - "6432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U DRAGON"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      auth-db:
        condition: service_healthy

  user-db:
    <<: *postgres-base
    environment:
      - POSTGRES_USER=DRAGON
      - POSTGRES_PASSWORD=DRAGON
