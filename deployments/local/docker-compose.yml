      - "14250:14250"
    networks:
      - app_network
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    networks:
      - app_network
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    command:
      - "--kafka.server=kafka-1:9092,kafka-2:9092,kafka-3:9092"
      - "--web.listen-address=0.0.0.0:9308"
      - "--log.level=debug"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9308/metrics || exit 1"]
      interval: 30s
      start_period: 120s
      timeout: 10s
      retries: 3

  loki:
    container_name: loki
    image: grafana/loki:3.5.8
    ports:
