        condition: service_started
      topup:
        condition: service_started
      transaction:
        condition: service_started
      transfer:
        condition: service_started
      withdraw:
        condition: service_started
    environment:
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - REDIS_ADDRS=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379,redis-node-4:6379,redis-node-5:6379,redis-node-6:6379



