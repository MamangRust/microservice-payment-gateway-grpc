apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: payment-gateway
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager-service.payment-gateway.svc.cluster.local:9093"]

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: 'golang-app-via-otel'
        static_configs:
          - targets: ['otel-collector-service.payment-gateway.svc.cluster.local:8889']
            labels:
              application: 'golang-app'
              environment: 'production'

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              application: 'Prometheus'
              environment: 'production'

      - job_name: 'kafka-exporter'
        static_configs:
          - targets: ['kafka-exporter-service.payment-gateway.svc.cluster.local:9308']
            labels:
              application: 'Kafka Exporter'
              environment: 'production'

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter-service.payment-gateway.svc.cluster.local:9100']
            labels:
              application: 'Node Exporter'
              environment: 'production'
